name: Publish Python Package

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # MANDATORY for trusted publishing
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: python -m pip install build twine

    - name: Build sdist and wheel
      run: |
        cd core
        python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: core/dist/

    - name: Publish package distributions to GitHub Packages
      run: |
        python -m twine upload --repository-url https://pypi.pkg.github.com/${{ github.repository_owner }}/${{ github.event.repository.name }} core/dist/*
      env:
        TWINE_USERNAME: ${{ github.actor }}
        TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
