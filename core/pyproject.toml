[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "blackswan"
version = "0.1.0"
description = "Stress-test mathematical and financial logic in Python code — find the exact line where models break."
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pyyaml>=6.0",
    "jsonschema>=4.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
]

[project.scripts]
blackswan = "blackswan.cli:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=blackswan --cov-report=term-missing"

[tool.coverage.run]
source = ["blackswan"]
omit = ["tests/*"]
